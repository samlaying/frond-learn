<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>传统多页 - 详情页</title>
    <style>
      :root { color-scheme: dark; --panel: rgba(15, 23, 42, 0.9); --text: #e5eefc; --muted: #9fb0d0; --accent: #f59e0b; --border: rgba(148, 163, 184, 0.22); --shadow: 0 24px 80px rgba(0,0,0,.35); }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #130f08 0%, #1f1720 100%); color: var(--text); }
      .shell { max-width: 920px; margin: 0 auto; padding: 24px; }
      .card { border: 1px solid var(--border); border-radius: 24px; background: var(--panel); box-shadow: var(--shadow); padding: 24px; }
      h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); }
      p { color: var(--muted); line-height: 1.7; }
      .panel { margin-top: 18px; padding: 18px; border: 1px solid var(--border); border-radius: 18px; background: rgba(255,255,255,.03); }
      .btn { display: inline-block; margin-right: 10px; margin-top: 8px; padding: 12px 16px; border-radius: 12px; text-decoration: none; font-weight: 700; color: #201300; background: linear-gradient(135deg, #fbbf24, var(--accent)); }
      .btn.secondary { color: var(--text); background: rgba(255,255,255,.04); border: 1px solid var(--border); }
      .meta { font-size: .95rem; }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>传统多页 - 详情页</h1>
        <p>你已经进入另一个页面了。这里就是传统多页最典型的感觉：URL 和内容一起换掉，页面也重新加载。</p>
        <div class="panel">
          <p class="meta">当前页面状态：这是详情页内容。</p>
          <a class="btn" href="./traditional-home.html">回首页</a>
          <a class="btn secondary" href="./index.html">回入口页</a>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02 - 三层架构版</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06111f;
        --panel: rgba(11, 20, 41, 0.9);
        --line: rgba(148, 163, 184, 0.18);
        --text: #e8eefb;
        --muted: #9faecd;
        --accent: #45d19f;
        --warn: #f5b14c;
        --danger: #fb7185;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, rgba(69, 209, 159, 0.18), transparent 30%), linear-gradient(180deg, #05101d, #0b1224);
        color: var(--text);
      }
      .shell { max-width: 1200px; margin: 0 auto; padding: 24px 18px 42px; }
      .topbar, .grid, .card {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 20px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }
      .topbar {
        display: flex; justify-content: space-between; gap: 12px; align-items: center;
        padding: 18px 20px;
      }
      .title h1 { margin: 0 0 6px; font-size: 1.2rem; }
      .title p { margin: 0; color: var(--muted); font-size: 0.92rem; }
      .status {
        padding: 10px 14px; border-radius: 999px; background: rgba(69, 209, 159, 0.12);
        color: #b6ffe8; border: 1px solid rgba(69, 209, 159, 0.22);
      }
      .grid { display: grid; grid-template-columns: 280px 1fr 340px; gap: 16px; margin-top: 16px; padding: 16px; }
      .card { padding: 18px; }
      .card h2, .card h3 { margin: 0 0 12px; }
      .ticket-item, .log-item, .history-item {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(5, 11, 24, 0.55);
        padding: 14px;
        margin-top: 12px;
      }
      .ticket-item.active { border-color: rgba(69, 209, 159, 0.3); background: rgba(69, 209, 159, 0.08); }
      .muted { color: var(--muted); line-height: 1.7; }
      .label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
      .reply-box textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(5, 11, 24, 0.7);
        color: var(--text);
        padding: 14px;
        font: inherit;
        line-height: 1.7;
      }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 15px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .primary { background: var(--accent); color: #051a13; }
      .secondary { background: transparent; color: var(--text); border: 1px solid var(--line); }
      .ghost { background: rgba(245, 177, 76, 0.12); color: #ffd79a; border: 1px solid rgba(245, 177, 76, 0.22); }
      .danger { background: rgba(251, 113, 133, 0.12); color: #fecdd3; border: 1px solid rgba(251, 113, 133, 0.22); }
      .small { font-size: 0.9rem; color: var(--muted); }
      .ok { color: #8ef0cb; }
      .error { color: #fecdd3; }
      .back { display: inline-block; margin-bottom: 14px; color: var(--accent); text-decoration: none; }
      @media (max-width: 1080px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back" href="./index.html">← 返回入口</a>
      <header class="topbar">
        <div class="title">
          <h1>客服工单回复台 - 三层架构版</h1>
          <p>UI / 业务 / 通讯 分开后，页面仍然是同一个业务，只是职责更清楚。</p>
        </div>
        <div class="status" id="status">待处理</div>
      </header>

      <section class="grid">
        <aside class="card">
          <h2>工单列表</h2>
          <div class="ticket-item active">
            <div class="label">当前工单</div>
            <strong>T-20418</strong>
            <div class="muted">订单已签收但用户未收到包裹</div>
          </div>
          <div class="ticket-item">
            <div class="label">历史工单</div>
            <strong>T-20417</strong>
            <div class="muted">退货地址错误，等待改址</div>
          </div>
          <div class="ticket-item">
            <div class="label">历史工单</div>
            <strong>T-20416</strong>
            <div class="muted">发票未开具，等待财务处理</div>
          </div>
        </aside>

        <article class="card reply-box">
          <h2>回复编辑</h2>
          <div class="label">业务状态</div>
          <div class="muted" id="bizState">当前草稿可保存，字数限制 200。</div>
          <div class="label" style="margin-top: 14px;">回复内容</div>
          <textarea id="draft"></textarea>
          <div class="row">
            <button class="primary" id="saveBtn">保存草稿</button>
            <button class="secondary" id="templateBtn">插入模板</button>
            <button class="ghost" id="simulateSlowBtn">模拟慢网</button>
            <button class="danger" id="clearBtn">清空</button>
          </div>
          <div class="small" id="meta">字数：0 / 200</div>
          <div class="history-item" id="resultBox">
            <div class="label">保存结果</div>
            <div class="small">还没有保存。</div>
          </div>
        </article>

        <aside class="card">
          <h2>处理日志</h2>
          <div class="log-item">UI 层只负责把用户输入收集起来，不直接判断规则。</div>
          <div class="log-item">业务层会先校验，再决定是否允许提交。</div>
          <div class="log-item">通讯层会模拟请求，后续可直接替换成真实 API。</div>
          <div class="history-item">
            <div class="label">最近动作</div>
            <div id="lastAction" class="small">首次进入页面</div>
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="./layered/main.js"></script>
  </body>
</html>

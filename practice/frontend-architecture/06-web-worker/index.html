<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>06 - Web Worker 练习</title>
<style>:root{color-scheme:dark;--bg:#151008;--panel:#251d12dd;--line:#5b472a;--text:#fff7e8;--muted:#cdbb9c;--accent:#ff7a45}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Avenir Next","PingFang SC",sans-serif;color:var(--text);background:radial-gradient(circle at 85% 0,#6b2b19 0,transparent 38%),linear-gradient(135deg,#120e08,#291b10)}main{max-width:1050px;margin:auto;padding:28px 20px}header,.card{border:1px solid var(--line);border-radius:22px;padding:22px;background:var(--panel)}h1{font-size:clamp(2rem,5vw,3.6rem);margin:8px 0}p{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}input{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;background:#120e08;color:var(--text);font:inherit}button{padding:11px 15px;border:0;border-radius:999px;background:var(--accent);font-weight:800;cursor:pointer}.secondary{background:transparent;color:var(--text);border:1px solid var(--line)}.row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.pulse{width:18px;height:18px;border-radius:50%;background:var(--accent);animation:pulse .7s infinite alternate}@keyframes pulse{to{transform:translateX(180px);opacity:.35}}.log{min-height:120px;background:#120e08;border-radius:14px;padding:14px;color:var(--muted);line-height:1.8}a{color:#ffb18e}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><a href="../">返回练习入口</a><header><small>06 / SECOND THREAD</small><h1>让计算离开主线程</h1><p>下面的小圆点由主线程动画驱动。主线程计算时它会停住；Worker 计算时它仍然移动，这才是本章要观察的效果。</p><div class="pulse"></div></header><section class="grid"><article class="card"><h2>同一份质数统计</h2><label>计算上限</label><input id="limit" type="number" value="800000" min="10000"><div class="row"><button id="main">在主线程计算</button><button id="worker" class="secondary">交给 Worker</button></div><p>容易混：给函数加 <code>async</code> 不会把纯计算搬走。</p></article><article class="card"><h2>运行日志</h2><div class="log" id="log">请选择一种计算方式。</div><p>消息链路：主线程 postMessage → Worker 计算 → postMessage 返回 → UI 更新。</p></article></section><script type="module" src="./app/main.js"></script></main></body></html>

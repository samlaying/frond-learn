<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#123a4a"><link rel="manifest" href="./manifest.webmanifest"><title>07 - PWA 练习</title>
<style>:root{color-scheme:dark;--panel:#0c2c38dd;--line:#2e6677;--text:#ecfbff;--muted:#a8cdd7;--accent:#ffcf66}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Avenir Next","PingFang SC",sans-serif;color:var(--text);background:radial-gradient(circle at 15% 10%,#1a6570,transparent 36%),linear-gradient(145deg,#06191f,#123844)}main{max-width:980px;margin:auto;padding:30px 20px}header,.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:24px}h1{font-size:clamp(2.2rem,6vw,4rem);margin:8px 0}p,li{color:var(--muted);line-height:1.75}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.status{font-size:1.25rem;color:var(--accent);font-weight:800}button{border:0;border-radius:999px;padding:11px 16px;background:var(--accent);font-weight:800;cursor:pointer}a{color:var(--accent)}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><a href="../">返回练习入口</a><header><small>07 / INSTALLABLE + OFFLINE</small><h1>让网页在断网后仍能打开</h1><p>Manifest 描述“如何安装”，Service Worker 决定“去网络还是缓存拿文件”。PWA 是能力组合，不是一套 App 风格的 CSS。</p></header><section class="grid"><article class="card"><h2>当前状态</h2><p class="status" id="network">检测网络中...</p><p id="worker">正在注册 Service Worker...</p><button id="install" hidden>安装到设备</button></article><article class="card"><h2>离线验证</h2><ol><li>在线打开本页一次。</li><li>刷新，让 Worker 接管页面。</li><li>开发者工具切换 Offline。</li><li>再次刷新，页面仍应出现。</li></ol><p id="log">页面脚本已运行。</p></article></section><script src="./app.js"></script></main></body></html>

<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#17213a"><link rel="manifest" href="./manifest.webmanifest"><title>08 - 离线消息工作台</title>
<style>:root{color-scheme:dark;--panel:#111a2ddd;--line:#34415d;--text:#f3f6ff;--muted:#aeb9d0;--accent:#74e0c1;--hot:#ffb86b}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Avenir Next","PingFang SC",sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0,#17564f,transparent 34%),radial-gradient(circle at 90% 5%,#5c3520,transparent 30%),#080d18}main{max-width:1180px;margin:auto;padding:26px 20px 50px}header,.card{border:1px solid var(--line);background:var(--panel);border-radius:22px;padding:22px}h1{font-size:clamp(2.2rem,5vw,4rem);margin:8px 0}p{color:var(--muted);line-height:1.7}.flow{color:var(--accent);font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}textarea{width:100%;min-height:120px;border:1px solid var(--line);border-radius:14px;background:#090f1d;color:var(--text);padding:14px;font:inherit}button{border:0;border-radius:999px;padding:10px 15px;background:var(--accent);font-weight:800;cursor:pointer}.secondary{background:transparent;color:var(--text);border:1px solid var(--line)}.row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.message,.log{border-top:1px solid var(--line);padding:12px 0}.meta{font-size:.85rem;color:var(--hot)}#logs{max-height:210px;overflow:auto;color:var(--muted)}a{color:var(--accent)}@media(max-width:820px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><a href="../">返回练习入口</a><header><small>08 / COMPLETE PRACTICE</small><h1>离线消息工作台</h1><p>一次保存会经过分层、本地数据库、事件广播和 Worker 统计。刷新页面后记录仍在，离线时应用外壳仍能打开。</p><p class="flow">UI → Domain → Repository → Event Bus → 列表 + Worker → UI</p></header><section class="grid"><article class="card"><h2>写消息</h2><textarea id="content">我正在把前面的架构概念串成一个完整流程。</textarea><div class="row"><button id="save">校验并保存</button><button id="refresh" class="secondary">从数据库重读</button></div><p id="status">等待操作。</p><h3>Worker 文本统计</h3><p id="stats">保存一条消息后开始统计。</p><h3>Event Bus 运行日志</h3><div id="logs"><div class="log">应用正在初始化...</div></div></article><article class="card"><h2>IndexedDB 消息列表</h2><div id="messages"></div></article></section><script type="module" src="./app/main.js"></script></main></body></html>
